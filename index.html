    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

<script>
document.addEventListener('contextmenu', e => {
    e.preventDefault();
});

document.querySelectorAll('img').forEach(img => {
    img.setAttribute('draggable', 'false');

    img.addEventListener('dragstart', e => {
        e.preventDefault();
    });
});
</script>
